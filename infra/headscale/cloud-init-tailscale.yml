#cloud-config
package_update: true
packages:
  - ca-certificates
  - curl
  - git
  - iptables
  - iptables-persistent

runcmd:
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - sysctl -w net.ipv4.ip_forward=1
  - sysctl -w net.ipv6.conf.all.forwarding=1
  - echo 'net.ipv4.ip_forward=1' >> /etc/sysctl.d/99-tailscale.conf
  - echo 'net.ipv6.conf.all.forwarding=1' >> /etc/sysctl.d/99-tailscale.conf
  - 'DEV=$(ip route show default | awk ''{print $5}'' | head -1) && iptables -t nat -A POSTROUTING -o $DEV -j MASQUERADE'
  - 'DEV=$(ip route show default | awk ''{print $5}'' | head -1) && ip6tables -t nat -A POSTROUTING -o $DEV -j MASQUERADE'
  - iptables -A FORWARD -i tailscale0 -j ACCEPT
  - iptables -A FORWARD -o tailscale0 -j ACCEPT
  - ip6tables -A FORWARD -i tailscale0 -j ACCEPT
  - ip6tables -A FORWARD -o tailscale0 -j ACCEPT
  - netfilter-persistent save
  - systemctl enable docker
  - systemctl start docker
  - git clone https://github.com/AJahueyM/Porebazu.git /opt/porebazu
  - cd /opt/porebazu/vpn && docker compose -f docker-compose-tailscale.yml up -d

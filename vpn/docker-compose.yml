services:
  headplane:
    image: ghcr.io/tale/headplane:latest
    container_name: headplane
    restart: unless-stopped
    depends_on:
      headplane-init:
        condition: service_completed_successfully
    volumes:
      - "/opt/porebazu/vpn/headplane/config.yml:/etc/headplane/config.yaml"
      - "headplane-data:/var/lib/headplane"
      - "/opt/porebazu/vpn/headscale/config.yml:/etc/headscale/config.yaml"
      - "/opt/porebazu/vpn/headscale/dns_records.json:/etc/headscale/dns_records.json"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    labels:
      # Expose the admin UI at /admin
      - "traefik.enable=true"
      - "traefik.http.routers.headplane.rule=Host(`vpn.porebazu.com`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.headplane.entrypoints=websecure"
      - "traefik.http.routers.headplane.tls=true"
      - "traefik.http.routers.headplane.tls.certresolver=letsencrypt"
      - "traefik.http.services.headplane.loadbalancer.server.port=3000"

  headplane-init:
    image: alpine:latest
    container_name: headplane-init
    depends_on:
      headscale:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache openssl docker-cli
        if ! grep -q "HEADPLANE_API_KEY" /etc/headplane/config.yaml; then
          echo "API key already configured, skipping"
          exit 0
        fi
        KEY=$$(docker exec headscale headscale apikeys create -o json --expiration 9999d 2>/dev/null | tr -d '"')
        if [ -z "$$KEY" ]; then
          echo "Failed to create API key"
          exit 1
        fi
        sed "s/HEADPLANE_API_KEY/$$KEY/" /etc/headplane/config.yaml > /tmp/config.yaml
        cat /tmp/config.yaml > /etc/headplane/config.yaml
        if [ ! -f /var/lib/headplane/cookie_secret ]; then
          openssl rand -base64 24 > /var/lib/headplane/cookie_secret
        fi
        echo "API key configured and cookie secret created successfully"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "/opt/porebazu/vpn/headplane/config.yml:/etc/headplane/config.yaml"
      - "headplane-data:/var/lib/headplane"

  headscale:
    image: headscale/headscale:latest
    container_name: headscale
    restart: unless-stopped
    command: serve
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    volumes:
      - "/opt/porebazu/vpn/headscale/config.yml:/etc/headscale/config.yaml"
      - "/opt/porebazu/vpn/headscale/dns_records.json:/etc/headscale/dns_records.json"
      - "/opt/porebazu/vpn/headscale/data:/var/lib/headscale"
    labels:
      - "me.tale.headplane.target=headscale"

      # Traefik labels to expose Headscale at vpn.porebazu.com
      - "traefik.enable=true"
      - "traefik.http.routers.headscale.rule=Host(`vpn.porebazu.com`)"
      - "traefik.http.routers.headscale.entrypoints=websecure"
      - "traefik.http.routers.headscale.tls=true"
      - "traefik.http.routers.headscale.tls.certresolver=letsencrypt"
      - "traefik.http.services.headscale.loadbalancer.server.port=8080"

      # This middleware is essential to ensuring Headplane works correctly
      - "traefik.http.routers.headscale.middlewares=cors"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.cors.headers.accesscontrolallowmethods=GET,POST,PUT"
      - "traefik.http.middlewares.cors.headers.accesscontrolalloworiginlist=https://vpn.porebazu.com"
      - "traefik.http.middlewares.cors.headers.accesscontrolmaxage=100"
      - "traefik.http.middlewares.cors.headers.addvaryheader=true"

      # If you would optionally like to automatically redirect / to /admin
      - "traefik.http.routers.rewrite.rule=Host(`vpn.porebazu.com`) && Path(`/`)"
      - "traefik.http.routers.rewrite.entrypoints=websecure"
      - "traefik.http.routers.rewrite.tls=true"
      - "traefik.http.routers.rewrite.tls.certresolver=letsencrypt"
      - "traefik.http.routers.rewrite.service=headscale"
      - "traefik.http.routers.rewrite.middlewares=rewrite"
      - "traefik.http.middlewares.rewrite.addprefix.prefix=/admin"

  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/opt/porebazu/vpn/traefik/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik-certs:/certs"

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    depends_on:
      headscale:
        condition: service_healthy
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--login-server=https://vpn.porebazu.com --advertise-exit-node
      - TS_USERSPACE=false
    volumes:
      - tailscale-data:/var/lib/tailscale

  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    network_mode: host
    volumes:
      - adguard-work:/opt/adguardhome/work
      - adguard-conf:/opt/adguardhome/conf
      - "/opt/porebazu/vpn/adguard/AdGuardHome.yaml:/opt/adguardhome/conf/AdGuardHome.yaml"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adguard.rule=Host(`dns.porebazu.com`)"
      - "traefik.http.routers.adguard.entrypoints=websecure"
      - "traefik.http.routers.adguard.tls=true"
      - "traefik.http.routers.adguard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.adguard.service=adguard"
      - "traefik.http.services.adguard.loadbalancer.server.url=http://host.docker.internal:8080"


volumes:
  traefik-certs:
  headplane-data:
  tailscale-data:
  adguard-work:
  adguard-conf: